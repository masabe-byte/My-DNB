<!DOCTYPE html>
<html lang='zh-CN'>

<head>
    <meta charset='utf-8' />
    <meta name="theme-color" content="#FFFFFF" />
    <link rel='stylesheet' type='text/css' href='/styles/default.css' media='screen' />
    <style>
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #fff;
            color: #222;
            margin: 0;
            padding: 0;
        }

        .config-container {
            padding: 15px;
        }

        .config-header {
            display: flex;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
        }

        .lab-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 1px solid #333;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        .lab-btn:hover {
            background: #f0f0f0;
        }

        .config-title {
            margin-left: 15px;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .config-section {
            background: #f8f8f8;
            border: 1px solid #ccc;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .config-label {
            font-size: 13px;
        }

        .toggle-switch {
            width: 40px;
            height: 20px;
            cursor: pointer;
        }

        .config-action {
            background: #f8f8f8;
            border: 1px solid #ccc;
            padding: 10px 15px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }

        .config-action:hover {
            background: #f0f0f0;
        }

        .level-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .level-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #333;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .level-btn:hover {
            background: #f0f0f0;
        }

        .level-num {
            font-size: 16px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
    </style>
    <input type="file" id="fileinput" style="display:none" />
</head>

<body>
    <div class="config-container">
        <div class="config-header">
            <div id='#back' class="lab-btn">◀</div>
            <span class="config-title">设置</span>
        </div>

        <div class="config-section">
            <span class="config-label">每日重置为 N=1</span>
            <svg id='reset_n' class="toggle-switch" viewBox='-20 -10 40 20'>
                <rect width=40 height=15 x=-20 y=-7.5 rx=7 ry=7 fill='grey' style='opacity:0.5' />
                <circle cx=-10 cy=0 r=8 fill='grey' />
            </svg>
        </div>

        <div class="config-section">
            <span class="config-label">锁定 N 等级（不自动调整）</span>
            <svg id='lock_n' class="toggle-switch" viewBox='-20 -10 40 20'>
                <rect width=40 height=15 x=-20 y=-7.5 rx=7 ry=7 fill='grey' style='opacity:0.5' />
                <circle cx=-10 cy=0 r=8 fill='grey' />
            </svg>
        </div>

        <div class="config-section" id="#set_level">
            <span class="config-label">跳转到等级</span>
            <div class="level-controls">
                <div id="#level_down" class="level-btn">−</div>
                <span id="#level_num" class="level-num">1</span>
                <div id="#level_up" class="level-btn">+</div>
            </div>
        </div>

        <div id='#download_stats' class="config-action">
            <span>↓</span> 导出统计数据
        </div>

        <label for='#upload_stats'>
            <div class="config-action">
                <span>↑</span> 恢复统计数据
            </div>
        </label>
        <input id='#upload_stats' type='file' style="display:none" />

        <!-- 危险操作，放在底部并弱化显示 -->
        <div style="margin-top: 50px; padding-top: 15px; border-top: 1px solid #eee;">
            <div id='#clear_storage' style="font-size: 11px; color: #999; cursor: pointer; text-align: center;">
                清除所有数据
            </div>
        </div>
    </div>
</body>

</html>
