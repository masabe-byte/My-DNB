<!DOCTYPE html>
<html lang='zh-CN'>

<head>
  <meta charset='utf-8' />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel='stylesheet' type='text/css' href='../styles/default.css' media='screen' />
  <style>
    body {
      font-family: 'Consolas', 'Monaco', monospace;
      background: #fff;
      color: #222;
      margin: 0;
      padding: 0;
    }

    .score-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 15px 5%;
      box-sizing: border-box;
    }

    .score-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }

    .lab-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border: 1px solid #333;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }

    .lab-btn:hover {
      background: #f0f0f0;
    }

    .dprime-title {
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .data-panel {
      background: #f8f8f8;
      border: 1px solid #ccc;
      padding: 15px;
      margin: 15px 0;
    }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr 80px 1fr;
      gap: 10px;
      text-align: center;
      font-size: 14px;
    }

    .data-grid .header {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ddd;
    }

    .data-grid .label {
      font-weight: bold;
      color: #444;
    }

    .data-grid .value {
      font-size: 18px;
      font-weight: bold;
    }

    .data-grid .dprime-row {
      border-top: 1px solid #ddd;
      padding-top: 8px;
      margin-top: 5px;
    }

    .action-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .level-display {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .play-btn {
      width: 60px;
      height: 60px;
      border: 3px solid #333;
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .play-btn:hover {
      background: #f0f0f0;
    }

    .play-btn svg {
      width: 24px;
      height: 24px;
    }

    .games-today {
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>

<body style="user-select:none;">
  <div class="score-container">
    <div class="score-header">
      <div id='#back' class="lab-btn">◀</div>
      <span id="title" class="dprime-title">d' = 0.00</span>
    </div>

    <div class="data-panel">
      <div class="data-grid">
        <div class="header">视觉</div>
        <div class="header">指标</div>
        <div class="header">听觉</div>

        <div id="vis_hits" class="value">0</div>
        <div class="label">命中</div>
        <div id="letter_hits" class="value">0</div>

        <div id="vis_misses" class="value">0</div>
        <div class="label">漏检</div>
        <div id="letter_misses" class="value">0</div>

        <div id="vis_wrong" class="value">0</div>
        <div class="label">误报</div>
        <div id="letter_wrong" class="value">0</div>

        <div id="vis_dprime" class="value dprime-row">-</div>
        <div class="label dprime-row">d'</div>
        <div id="letter_dprime" class="value dprime-row">-</div>
      </div>
    </div>

    <div class="action-section">
      <div id="level" class="level-display">N = 1</div>
      <div id="#play" class="play-btn">
        <svg viewBox="0 0 24 24">
          <polygon points="6,4 20,12 6,20" fill="#333" />
        </svg>
      </div>
      <div id="ngames" class="games-today">0 / 20 今日</div>
    </div>
  </div>
</body>

</html>
