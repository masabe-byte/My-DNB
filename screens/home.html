<!DOCTYPE html>
<html lang='zh-CN'>

<head>
    <meta charset='utf-8' />
    <meta name="theme-color" content="#FFFFFF" />
    <link rel='stylesheet' type='text/css' href='../styles/default.css' media='screen' />
    <style>
        .lab-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid #333;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Consolas', monospace;
            transition: background 0.15s;
            position: absolute;
        }

        .lab-btn:hover {
            background: #f0f0f0;
        }

        .lab-btn svg {
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>
    <div class='screen'>
        <!-- 设置按钮 - 左上 -->
        <div id='#gear' class="lab-btn" style='top:10px;left:10px;'>
            <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path
                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
        </div>

        <!-- 统计按钮 - 右上 -->
        <div id='#graph' class="lab-btn" style='top:10px;right:10px;'>
            <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2">
                <path d="M18 20V10M12 20V4M6 20v-6" />
            </svg>
        </div>

        <div id='msgs' style='position:absolute;bottom:4pt;right:4pt;text-align:right;font-size:11px;color:#666;'></div>
    </div>
</body>

</html>
